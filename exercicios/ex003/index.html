<head>

    <title>Simbolos e emoji no site</title>
</head>
<body>
    <h1>Símbolos Especiais (Entidades HTML)</h1>
    
    <p>Símbolos de Navegação: &lt; (menor que ) e &gt; (maior que ).</p>
    
    <p>Marcas e Direitos: &reg; (marca registrada ®), &copy; (copyright ©) e &trade; (trade mark ™)</p>
    
    <p>Moedas: &euro; (€), &pound; (£), &yen; (¥) e &cent; (¢)</p>
    
    <p>Letras Gregas: &delta; (δ minúsculo) e &Delta; (Δ maiúsculo)</p>

    <h2>Uso de Emojis</h2>

    &#x1F596;
