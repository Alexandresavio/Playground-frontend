<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Imagem</title>
</head>
<body>
    <h1>Trabalhando com imagens</h1>
    <!--menso diretório-->
    <img src="paisagem.jpg" alt="foto paisagem" width="600px">
    
    <br>
    <!--em uma pasta chamada imagens-->
    <img src="imagem/Estados-Unidos_1732789143653.jpg" alt="foto EUA" width="600px">

    <br>
    <!--imagem da internet-->
    <img src="https://www.10wallpaper.com/wallpaper/3840x2160/1802/USA_Golden_Gate_Bridge_Night_Landscape_3840x2160.jpg" alt="foto internet" width="600px">

    <br>
    <!--imagem clicável-->
    <a href="https://www.google.com/?hl=pt_BR" target="_blank">
        <img src="imagem/2965278.png" alt="icone google" width="50px"> 
    </a>
    <br>
    clique para visitar google.com
    <br>
    <br>
</body>
</html>
