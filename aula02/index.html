<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Classes</title>
    <style>
        .destaque {
            color: white;
            background-color: blue;
            padding: 10px;
            border-radius: 5px;
        }
         #titulo {
            color: red;
            font-size: 24px;
        }
        span{
            color: rgb(122, 122, 53);
        }
    </style>
</head>
<body>
    <h1 id="titulo">Este título tem um <span>ID</span> único</h1>
    <p class="destaque">Este é um parágrafo destacado.</p>
    <p class="destaque">Este também é destacado.</p>

</body>
</html>
